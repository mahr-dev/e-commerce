@if (loading()) {
  <div class="loading-inline">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
} @else {
  <mat-card class="settings-panel">
    <mat-card-header>
      <mat-card-title>Información personal</mat-card-title>
      <mat-card-subtitle>Nombre y datos de contacto</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="save()">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="name" autocomplete="name" />
          @if (form.get('name')?.invalid && form.get('name')?.touched) {
            <mat-error>Introduce un nombre válido</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Correo electrónico</mat-label>
          <input matInput formControlName="email" />
          <mat-hint>No se puede cambiar desde aquí</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Teléfono</mat-label>
          <input matInput formControlName="phone" type="tel" autocomplete="tel" />
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="form.invalid || saving()"
        >
          @if (saving()) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            <mat-icon>save</mat-icon>
          }
          Guardar cambios
        </button>
      </form>
    </mat-card-content>
  </mat-card>
}
