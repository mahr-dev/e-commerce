<div class="settings-page page-content">
  <h1 class="settings-title">Mi cuenta</h1>
  <p class="settings-subtitle">Configura tu perfil, pedidos, direcciones y métodos de pago.</p>

  <div class="settings-grid">
    <mat-card class="settings-nav-card">
      <mat-nav-list>
        <a
          mat-list-item
          routerLink="informacion"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <mat-icon matListItemIcon>person</mat-icon>
          <span matListItemTitle>Información</span>
        </a>
        <a mat-list-item routerLink="pedidos" routerLinkActive="active">
          <mat-icon matListItemIcon>receipt_long</mat-icon>
          <span matListItemTitle>Pedidos</span>
        </a>
        <a mat-list-item routerLink="direcciones" routerLinkActive="active">
          <mat-icon matListItemIcon>place</mat-icon>
          <span matListItemTitle>Direcciones</span>
        </a>
        <a mat-list-item routerLink="pagos" routerLinkActive="active">
          <mat-icon matListItemIcon>credit_card</mat-icon>
          <span matListItemTitle>Métodos de pago</span>
        </a>
      </mat-nav-list>
    </mat-card>

    <div class="settings-outlet">
      <router-outlet />
    </div>
  </div>
</div>
